spring.application.name=sequence-api
server.port=8080

# Jackson: keep LocalDateTime as ISO-8601 strings
# (e.g. "2026-05-23T10:15:30") instead of a numeric array.
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------- Oracle XE 21c connection ----------------
# Local Oracle XE 21c reachable at localhost:1521, pluggable DB "XEPDB1".
# Override these in your own application-local.properties (or env vars) if
# your install differs.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=system
spring.datasource.password=oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ---------------- JPA / Hibernate ----------------
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# "update" lets Hibernate create / extend the tables on first startup.
# Use "validate" or "none" in production.
spring.jpa.hibernate.ddl-auto=update
# Print SQL statements to the log — handy while learning.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
