# =====================================================================
# Measurement Conversion API — application.properties
# Values are overridable via environment variables for 12-factor deploys.
# =====================================================================

spring.application.name=measurement-conversion-api
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ---------- Datasource -----------------------------------------------
# Defaults to in-memory H2 so the app runs without any external DB.
# For Oracle XE set: DB_URL, DB_USER, DB_PASSWORD environment variables.
#   e.g. DB_URL=jdbc:oracle:thin:@//localhost:1521/XEPDB1
#        DB_USER=measurement
#        DB_PASSWORD=your_password
spring.datasource.url=${DB_URL:jdbc:h2:mem:devdb;MODE=Oracle;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP tuning (sane defaults for a small service)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---------- JPA / Hibernate ------------------------------------------
# Dialect is auto-detected from the JDBC URL — no need to set it explicitly.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# schema.sql uses Oracle PL/SQL syntax so skip it when running on H2.
# Set to 'always' only when DB_URL points to Oracle.
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# ---------- Jackson --------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ---------- Actuator -------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=1.0.0

# ---------- Springdoc / Swagger UI -----------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---------- Error handling -------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
